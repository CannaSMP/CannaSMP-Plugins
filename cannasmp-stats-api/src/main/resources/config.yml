# CannaSMP ServerAPI
# Secure live JSON API plus GitHub Pages compatible status export.

debug: false

server:
  port: 8080
  bind-host: "0.0.0.0"
  public-host: "130.12.156.44"
  worker-threads: 4

security:
  api-key: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET"
  require-auth-by-default: true
  public-endpoints:
    - "/health"
    - "/api/v1/health"
    - "/api/v1/status"
    - "/api/v1/version"
    - "/api/v1/public"
    - "/api/v1/website"
  ip-whitelist:
    enabled: false
    allowed:
      - "127.0.0.1"

cors:
  enabled: true
  allowed-origins:
    - "https://cannasmp.github.io"

rate-limit:
  enabled: true
  requests-per-minute: 120

stats:
  refresh-seconds: 5
  public-player-list: true
  expose-player-details: true
  leaderboard-size: 10

integrations:
  vault: true
  luckperms: true
  placeholderapi: true
  essentials: true

website-export:
  enabled: true
  file: "website-export/server-status.json"
  github:
    enabled: false
    owner: "CannaSMP"
    repo: "cannasmp.github.io"
    branch: "main"
    path: "data/server-status.json"
    token: ""

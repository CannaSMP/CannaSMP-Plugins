name: CannaSMPStatsAPI
version: 2.0.0
main: net.cannasmp.statsapi.CannaSMPStatsApiPlugin
api-version: '1.21'
author: CannaSMP
description: Secure live HTTP JSON API and website status exporter for CannaSMP.
softdepend:
  - PlaceholderAPI
  - Vault
  - LuckPerms
  - Essentials
commands:
  serverapi:
    description: Manage the CannaSMP server API.
    usage: /serverapi <reload|status|api|version|key>
    permission: cannasmp.serverapi.admin
  statsapi:
    description: Legacy alias for /serverapi.
    usage: /statsapi <reload|status|api|version|key>
    permission: cannasmp.serverapi.admin
permissions:
  cannasmp.serverapi.admin:
    description: Allows managing and inspecting the CannaSMP ServerAPI plugin.
    default: op
  cannasmp.statsapi.admin:
    description: Legacy permission kept for compatibility.
    default: op
